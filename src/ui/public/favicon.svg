<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f0f1a"/>

  <!-- Task bar A (top-left) -->
  <rect x="3" y="7" width="13" height="5" rx="1.5" fill="#863bff"/>

  <!-- Task bar B (top-right) -->
  <rect x="20" y="7" width="9" height="5" rx="1.5" fill="#5b8fff"/>

  <!-- Task bar C (bottom, depends on A and B) -->
  <rect x="9" y="20" width="14" height="5" rx="1.5" fill="#863bff" opacity="0.85"/>

  <!-- Arrow A → C -->
  <path d="M9 12 C9 16, 13 20, 13 20" stroke="#863bff" stroke-width="1.5" fill="none" opacity="0.9" marker-end="url(#pa)"/>

  <!-- Arrow B → C -->
  <path d="M23 12 C23 16, 21 20, 21 20" stroke="#5b8fff" stroke-width="1.5" fill="none" opacity="0.9" marker-end="url(#pb)"/>

  <defs>
    <marker id="pa" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#863bff" opacity="0.9"/>
    </marker>
    <marker id="pb" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#5b8fff" opacity="0.9"/>
    </marker>
  </defs>
</svg>
